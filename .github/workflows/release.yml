name: release

# Triggered on a `v*` tag. Publishes framework-dependent ZIPs for the WPF host
# and CLI, emits an SPDX SBOM + SHA-256 manifest, and creates GitHub artifact
# attestations. Authenticode signing is skipped until the maintainer provisions
# Azure Artifact Signing secrets. The workflow always publishes ARTIFACT-TRUST.txt
# and release notes so signed/unsigned status is explicit.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-sign:
    runs-on: windows-latest
    env:
      HAVE_SIGNING_SECRETS: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_SIGNING_ENDPOINT != '' && secrets.AZURE_SIGNING_ACCOUNT != '' && secrets.AZURE_SIGNING_PROFILE != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore + build (Release)
        run: |
          dotnet restore PhoneFork.slnx
          dotnet build PhoneFork.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/PhoneFork.Core.Tests/PhoneFork.Core.Tests.csproj -c Release --no-build

      - name: Publish WPF (framework-dependent, win-x64)
        run: |
          dotnet publish src/PhoneFork.App/PhoneFork.App.csproj `
            -c Release -r win-x64 --self-contained false `
            -o publish/wpf

      - name: Publish CLI (framework-dependent, win-x64)
        run: |
          dotnet publish src/PhoneFork.Cli/PhoneFork.Cli.csproj `
            -c Release -r win-x64 --self-contained false `
            -o publish/cli

      # Azure Artifact Signing signs the Authenticode-capable EXE/DLL payloads
      # before they are zipped. The ZIPs themselves are attested by GitHub.
      - name: Sign Windows binaries (Azure Artifact Signing)
        if: ${{ env.HAVE_SIGNING_SECRETS == 'true' }}
        uses: azure/artifact-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files: |
            ${{ github.workspace }}\publish\wpf\PhoneFork.exe
            ${{ github.workspace }}\publish\wpf\PhoneFork.dll
            ${{ github.workspace }}\publish\wpf\PhoneFork.Core.dll
            ${{ github.workspace }}\publish\cli\phonefork.exe
            ${{ github.workspace }}\publish\cli\phonefork.dll
            ${{ github.workspace }}\publish\cli\PhoneFork.Core.dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: PhoneFork release
          description-url: https://github.com/SysAdminDoc/PhoneFork

      - name: Verify signed Windows binaries
        if: ${{ env.HAVE_SIGNING_SECRETS == 'true' }}
        shell: pwsh
        run: |
          $paths = @(
            "publish/wpf/PhoneFork.exe",
            "publish/wpf/PhoneFork.dll",
            "publish/wpf/PhoneFork.Core.dll",
            "publish/cli/phonefork.exe",
            "publish/cli/phonefork.dll",
            "publish/cli/PhoneFork.Core.dll"
          )
          foreach ($path in $paths) {
            $sig = Get-AuthenticodeSignature -LiteralPath $path
            if ($sig.Status -ne "Valid") {
              throw "Invalid Authenticode signature on $path: $($sig.Status) $($sig.StatusMessage)"
            }
            Write-Host "Valid signature: $path ($($sig.SignerCertificate.Subject))"
          }

      - name: Zip release artifacts
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag) { $tag = "dev" }
          Compress-Archive -Path publish/wpf/* -DestinationPath "PhoneFork-$tag-wpf-win-x64.zip"
          Compress-Archive -Path publish/cli/* -DestinationPath "PhoneFork-$tag-cli-win-x64.zip"

      - name: Generate SPDX SBOM and checksums
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag) { $tag = "dev" }
          $wpf = "PhoneFork-$tag-wpf-win-x64.zip"
          $cli = "PhoneFork-$tag-cli-win-x64.zip"
          $sbom = "PhoneFork-$tag-sbom.spdx.json"
          & ./scripts/New-ReleaseSbom.ps1 `
            -Version $tag `
            -OutputPath $sbom `
            -ArtifactPath @($wpf, $cli)
          Get-FileHash -Algorithm SHA256 $wpf, $cli, $sbom |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path -Leaf $_.Path)" } |
            Set-Content -Path "PhoneFork-$tag-SHA256SUMS.txt" -Encoding UTF8

      - name: Write artifact trust note
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag) { $tag = "dev" }
          if ($env:HAVE_SIGNING_SECRETS -eq "true") {
            $lines = @(
              "PhoneFork release artifact trust",
              "",
              "Status: Windows EXE/DLL payloads were signed with Azure Artifact Signing before ZIP packaging.",
              "Important: ZIP files are containers. Verify the GitHub attestation for the downloaded ZIP, then extract and verify Authenticode signatures on PhoneFork.exe / phonefork.exe and PhoneFork*.dll.",
              "SmartScreen: a valid signature identifies the publisher, but new publisher identities can still show warnings until Microsoft reputation builds.",
              "Verify signatures: signtool verify /pa /v <extracted-exe-or-dll>.",
              "Verify provenance: gh attestation verify PhoneFork-$tag-wpf-win-x64.zip -R SysAdminDoc/PhoneFork.",
              "Verify SBOM attestation: gh attestation verify PhoneFork-$tag-wpf-win-x64.zip -R SysAdminDoc/PhoneFork --predicate-type https://spdx.dev/Document/v2.3."
            )
          } else {
            $lines = @(
              "PhoneFork release artifact trust",
              "",
              "Status: Windows EXE/DLL payloads are UNSIGNED. Azure Artifact Signing secrets were not configured for this run.",
              "Expected Windows behavior: SmartScreen or Defender may warn. This release should be treated as an unsigned development artifact.",
              "Verify provenance: gh attestation verify PhoneFork-$tag-wpf-win-x64.zip -R SysAdminDoc/PhoneFork.",
              "Verify SBOM attestation: gh attestation verify PhoneFork-$tag-wpf-win-x64.zip -R SysAdminDoc/PhoneFork --predicate-type https://spdx.dev/Document/v2.3."
            )
          }
          $lines | Set-Content -Path ARTIFACT-TRUST.txt -Encoding UTF8

      - name: Write release notes
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if (-not $tag) { $tag = "dev" }
          if ($env:HAVE_SIGNING_SECRETS -eq "true") {
            $status = "Signed Windows payload release"
            $trust = "Windows EXE/DLL payloads were signed with Azure Artifact Signing before ZIP packaging. SmartScreen may still warn for a new publisher identity until reputation builds."
          } else {
            $status = "Unsigned development release"
            $trust = "Windows EXE/DLL payloads are unsigned because Azure Artifact Signing secrets were not configured for this run. SmartScreen or Defender warnings are expected."
          }
          $notes = @(
            "# PhoneFork $tag",
            "",
            "Status: $status.",
            "",
            $trust,
            "",
            "Release assets include WPF and CLI ZIPs, an SPDX 2.3 SBOM, SHA-256 checksums, and ARTIFACT-TRUST.txt.",
            "",
            "Verify provenance:",
            "",
            "~~~powershell",
            "gh attestation verify .\PhoneFork-$tag-wpf-win-x64.zip -R SysAdminDoc/PhoneFork",
            "gh attestation verify .\PhoneFork-$tag-cli-win-x64.zip -R SysAdminDoc/PhoneFork",
            "gh attestation verify .\PhoneFork-$tag-wpf-win-x64.zip -R SysAdminDoc/PhoneFork --predicate-type https://spdx.dev/Document/v2.3",
            "~~~",
            "",
            "Verify signatures after extraction when this is a signed release:",
            "",
            "~~~powershell",
            "signtool verify /pa /v .\PhoneFork.exe",
            "signtool verify /pa /v .\PhoneFork.Core.dll",
            "~~~"
          )
          $notes | Set-Content -Path RELEASE-NOTES.md -Encoding UTF8

      # F066 - GitHub artifact attestations for release ZIP provenance.
      - name: Generate release ZIP provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: 'PhoneFork-*-win-x64.zip'

      - name: Generate release SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: 'PhoneFork-*-win-x64.zip'
          sbom-path: 'PhoneFork-${{ github.ref_name }}-sbom.spdx.json'

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE-NOTES.md
          fail_on_unmatched_files: true
          files: |
            PhoneFork-*-win-x64.zip
            PhoneFork-*-sbom.spdx.json
            PhoneFork-*-SHA256SUMS.txt
            ARTIFACT-TRUST.txt
