name: ci

# Pull-request and push CI gate (F067, F068, F069). Builds the .NET 10 host,
# runs the Core test suite, and scans for vulnerable transitive dependencies.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: build + test + vuln-scan
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          # Allow pre-release SDKs while .NET 10 SDK is rolling.
          include-prerelease: true

      - name: Restore
        run: dotnet restore PhoneFork.slnx

      - name: Build (Release)
        run: dotnet build PhoneFork.slnx -c Release --no-restore

      - name: Test (Release)
        run: dotnet test tests/PhoneFork.Core.Tests/PhoneFork.Core.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Vulnerable package scan
        run: |
          dotnet list PhoneFork.slnx package --vulnerable --include-transitive
          dotnet list PhoneFork.slnx package --outdated --include-transitive
        shell: pwsh

  helper-apk-lint:
    name: helper-apk assemble
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Build helper APK
        working-directory: helper-apk
        run: gradle --no-daemon :app:assembleDebug :app:assembleRelease

      - name: Verify helper APK metadata and staging gate
        working-directory: helper-apk
        run: |
          set -euo pipefail
          release_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
          debug_apk="app/build/outputs/apk/debug/app-debug.apk"
          ci_signed_apk="../artifacts/helper/PhoneForkHelper-ci-signed.apk"
          test -f "$release_apk"
          test -f "$debug_apk"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$release_apk" | tee helper-apk-metadata.txt
          mkdir -p ../artifacts/helper
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" sign \
            --ks "$HOME/.android/debug.keystore" \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$ci_signed_apk" \
            "$release_apk"
          pwsh ../scripts/Stage-HelperApk.ps1 \
            -ApkPath "$ci_signed_apk" \
            -OutputDirectory artifacts/helper \
            -AaptPath "$ANDROID_HOME/build-tools/35.0.0/aapt" \
            -ApkSignerPath "$ANDROID_HOME/build-tools/35.0.0/apksigner"
          cat ../artifacts/helper/PhoneForkHelper.apk.metadata.txt | tee -a helper-apk-metadata.txt
          grep -q "package: name='com.sysadmindoc.phonefork.helper'" helper-apk-metadata.txt
          grep -q "sdkVersion:'30'" helper-apk-metadata.txt
          grep -q "targetSdkVersion:'36'" helper-apk-metadata.txt

      - name: Upload helper APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phonefork-helper-apks
          path: |
            helper-apk/app/build/outputs/apk/debug/app-debug.apk
            helper-apk/app/build/outputs/apk/release/app-release-unsigned.apk
            helper-apk/helper-apk-metadata.txt
            artifacts/helper/PhoneForkHelper-ci-signed.apk
            artifacts/helper/PhoneForkHelper.apk
            artifacts/helper/PhoneForkHelper.apk.metadata.txt
            artifacts/helper/PhoneForkHelper.apk.sha256
